<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        div.container {
            background-color: lightsalmon;
            display: flex;
            flex-flow: row wrap;
            height: 400px;
            align-items: flex-start;
        }
        div.item {
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            padding: 20px;
        }
        div#i1 {
            order: 1;
            align-self: stretch;
        }
        div#i2 {
            align-self: center;
        }
        div#i3 {
            align-self: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item" id="i2">B</div>
        <div class="item">C</div>
        <div class="item" style="order: -3">D</div>
        <div class="item">E</div>
        <div class="item" id="i1">F</div>
        <div class="item" id="i3">G</div>
    </div>
</body>
</html>
