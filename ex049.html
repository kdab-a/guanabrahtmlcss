<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php">
        <p>
            <label for="inome">Nome: </label>
            <input type="text" name="nome" id="inome" required maxlength="30" minlength="5" placeholder="Nome Completo">
        </p>
        <p>
            <label for="imedia">Média: </label>
            <input type="number" name="media" id="imedia" min="0" max="10" value="5" step="0.5">
        </p>
        <p>
            <label for="iperiodo">Período Letivo: </label>
            <input type="month" name="periodo" id="iperiodo" value="2020-07">
        </p>
        <p>
            <label for="idate">Dia da Prova</label>
            <input type="date" name="date" id="idate">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
